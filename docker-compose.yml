version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/file-server
      - JWT_SECRET=a51305d8751d6b4da25b2c07b1362b24d2da5d44927ac0f88463f45031cedaea
    volumes:
      - ./server/uploads:/usr/src/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
